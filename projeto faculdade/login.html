<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF=8">
        <meta name="viewport" content="width=device=width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="../javascript/validacao.js" defer></script>
    </head>
    <body>
        <div class="wrapper">
            <h1>Login</h1>
            <p id="error-message"></p>
            <form id="form">
                <div>
                    <label for="email-input">
                        <img src="assets/images/icons/email.svg">
                    </label>
                    <input type="email" name="email" id="email-input" placeholder="Email">
                </div>
                <div> <label for="senha-input">
                        <img src="assets/images/icons/lock.svg">
                    </label>
                    <input type="password" name="senha" id="senha-input" placeholder="Senha">
                </div>
                <button type="submit">Login</button>
            </form>
            <p>Não tem uma conta? <a href="inscricao.html">Crie uma conta.</a></p>
        </div>
    </body>
</html>
